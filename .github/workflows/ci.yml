name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test

    steps:
    - uses: actions/checkout@v4.2.0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4.2.0
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Run tests
      run: |
        dotnet test tests/Domain.Tests/BoxTracker.Domain.Tests.fsproj --no-restore --verbosity detailed --logger "console;verbosity=detailed"
        dotnet test tests/Api.Tests/BoxTracker.Api.Tests.fsproj --no-restore --verbosity detailed --logger "console;verbosity=detailed"

  e2e:
    runs-on: ubuntu-latest
    name: E2E (Playwright)

    steps:
    - uses: actions/checkout@v4.2.0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4.2.0
      with:
        dotnet-version: '10.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4.1.0
      with:
        node-version: '20'

    - name: Install npm dependencies
      run: npm ci

    - name: Restore dotnet tools
      run: dotnet tool restore

    - name: Build frontend
      run: npm run build            # Fable + Vite production bundle
      timeout-minutes: 10

    # Cache the browser download, keyed on the installed @playwright/test
    # version so a dependency bump busts the cache automatically.
    - name: Resolve Playwright version
      id: pw
      run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      id: pw-cache
      uses: actions/cache@v4.2.3
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    - name: Run E2E tests
      run: E2E_DATA_DIR=$(mktemp -d) npx playwright test

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4.3.0
      if: failure()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [test, e2e]

    steps:
    - uses: actions/checkout@v4.2.0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4.2.0
      with:
        dotnet-version: '10.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4.1.0
      with:
        node-version: '20'

    - name: Install npm dependencies
      run: npm ci

    - name: Restore dotnet tools
      run: dotnet tool restore

    - name: Clean fable_modules cache
      run: rm -rf src/Client/fable_modules src/Client/dist src/Client/output.js

    - name: Build frontend
      run: npm run build
      timeout-minutes: 10

    - name: Publish server (Linux x64)
      run: dotnet publish src/Server/BoxTracker.Server.fsproj -c Release -r linux-x64 --self-contained=false -o ./publish/linux-x64

    - name: Publish server (Linux ARM64)
      run: dotnet publish src/Server/BoxTracker.Server.fsproj -c Release -r linux-arm64 --self-contained=false -o ./publish/linux-arm64

    - name: Create artifact
      uses: actions/upload-artifact@v4.3.0
      with:
        name: build-artifacts
        path: |
          publish/
          src/Client/dist/
        retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4.2.0

    - name: Download artifacts
      uses: actions/download-artifact@v4.1.0
      with:
        name: build-artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          publish/linux-x64/**
          src/Client/dist/**

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Oracle VM
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4.2.0

    - name: Download artifacts
      uses: actions/download-artifact@v4.1.0
      with:
        name: build-artifacts

    - name: Copy server binaries
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        source: "publish/linux-x64/"
        target: "/opt/boxtracker/server/"
        strip_components: 2

    - name: Clean and prepare frontend directory
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        script: |
          sudo rm -rf /opt/boxtracker/frontend/dist
          mkdir -p /opt/boxtracker/frontend/dist

    - name: Copy frontend
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        source: "src/Client/dist/"
        target: "/opt/boxtracker/frontend/"
        strip_components: 2

    - name: Migrate photos and restart service
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        script: |
          # Self-install jpegtran (libjpeg-turbo-progs) if missing. The deploy
          # user has a scoped NOPASSWD entry for exactly this apt-get command
          # (see deploy/SETUP.md); -n still avoids hanging on a password prompt
          # if that sudoers entry hasn't been applied yet, and a missing jpegtran
          # only means images are baseline (still valid) JPEG, so never fatal.
          command -v jpegtran >/dev/null 2>&1 || sudo -n apt-get install -y libjpeg-turbo-progs || echo "WARNING: jpegtran missing; images will be baseline JPEG. Apply the sudoers entry in deploy/SETUP.md or install libjpeg-turbo-progs manually."
          sudo systemctl stop boxtracker
          # Safety snapshot of every photo BEFORE the (potentially destructive)
          # migration. This is a local undo point that does not depend on the B2
          # mirror — the hourly rclone sync uses --b2-hard-delete, so a bad
          # migration could otherwise propagate the damage to the only backup
          # within 30 minutes. Keeps the 5 most recent snapshots.
          if [ -d /opt/boxtracker/data/photos ]; then
            mkdir -p /opt/boxtracker/backups
            ts=$(date +%Y%m%d-%H%M%S)
            tar -czf "/opt/boxtracker/backups/photos-pre-migration-$ts.tar.gz" \
              -C /opt/boxtracker/data photos
            ls -1t /opt/boxtracker/backups/photos-pre-migration-*.tar.gz \
              | tail -n +6 | xargs -r rm -f
          fi
          # Must pass BOXTRACKER_DATA explicitly: this runs the DLL directly over
          # SSH, so it does not inherit the env var the systemd unit sets. Without
          # it the migration targets ./data (the deploy user's home) instead of
          # the real photo store and silently converts nothing.
          BOXTRACKER_DATA=/opt/boxtracker/data /opt/dotnet/dotnet /opt/boxtracker/server/BoxTracker.Server.dll --migrate-photos || true
          sudo systemctl start boxtracker

    - name: Copy backup scripts
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        source: "scripts/"
        target: "/opt/boxtracker/scripts/"
        strip_components: 1

    - name: Configure rclone and backup scripts
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        script: |
          # Install rclone if not present
          command -v rclone || (curl https://rclone.org/install.sh | sudo bash)
          # Write rclone config from secrets
          mkdir -p /home/$USER/.config/rclone
          cat > /home/$USER/.config/rclone/rclone.conf << EOF
          [boxes-db]
          type = b2
          account = ${{ secrets.B2_DB_KEY_ID }}
          key = ${{ secrets.B2_DB_APP_KEY }}

          [boxes-images]
          type = b2
          account = ${{ secrets.B2_IMAGES_KEY_ID }}
          key = ${{ secrets.B2_IMAGES_APP_KEY }}
          EOF
          # Note: do NOT add bucket = field to rclone B2 config; use explicit paths instead
          chmod 600 /home/$USER/.config/rclone/rclone.conf
          # Make scripts executable and create log dir
          chmod +x /opt/boxtracker/scripts/*.sh
          sudo mkdir -p /var/log/boxtracker
          sudo chown $USER:$USER /var/log/boxtracker
          # Idempotently install cron jobs
          (crontab -l 2>/dev/null | grep -v 'boxtracker/scripts/backup') > /tmp/crontab_clean || true
          cat >> /tmp/crontab_clean << 'CRON'
          0  * * * *   /opt/boxtracker/scripts/backup-db.sh >> /var/log/boxtracker/backup-db.log 2>&1
          30 * * * *   /opt/boxtracker/scripts/backup-photos.sh >> /var/log/boxtracker/backup-photos.log 2>&1
          CRON
          crontab /tmp/crontab_clean
          rm /tmp/crontab_clean
