server {
    listen 80;
    server_name 158.179.31.108;  # replace with domain if you get one

    root /opt/boxtracker/frontend;
    index index.html;

    # Basic auth to keep the app private
    auth_basic "BoxTracker";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Serve frontend SPA - fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend (auth applies here too via inheritance)
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
