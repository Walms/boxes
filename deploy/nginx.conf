server {
    listen 80;
    server_name 158.179.31.108;  # replace with domain if you get one

    root /opt/boxtracker/frontend/dist;
    index index.html;

    # Basic auth to keep the app private
    auth_basic "BoxTracker";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Compress text assets so the JS bundle, CSS and JSON API responses
    # download faster (the bundle is the bulk of first-load time).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Vite content-hashes everything under /assets, so those files never
    # change in place — cache them for a year and skip revalidation.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The HTML entry point must stay uncached so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Serve frontend SPA - fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend (auth applies here too via inheritance)
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
